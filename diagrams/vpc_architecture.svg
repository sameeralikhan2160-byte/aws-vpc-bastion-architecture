<svg width="1280" height="860" viewBox="0 0 1280 860" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="860" fill="#ffffff"/>

  <text x="640" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">AWS VPC Architecture — Bastion Host + NAT Gateway</text>
  <text x="640" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">Region: ap-south-1 (Mumbai)  |  VPC: my-vpc-01  |  CIDR: 10.0.0.0/16</text>

  <!-- Internet -->
  <g>
    <ellipse cx="1140" cy="130" rx="80" ry="40" fill="#e6f1fb" stroke="#378ade" stroke-width="1.5"/>
    <text x="1140" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#0c447c">Internet</text>
  </g>

  <!-- Admin -->
  <g>
    <rect x="40" y="100" width="170" height="60" rx="10" fill="#f1efe8" stroke="#888780" stroke-width="1.5"/>
    <text x="125" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#2c2c2a">You (Admin)</text>
    <text x="125" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f5e5a">SSH client, your IP only</text>
  </g>

  <!-- Arrow: Admin -> Bastion -->
  <path d="M125 160 L125 300" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="135" y="235" font-family="Arial, sans-serif" font-size="13" fill="#334155">SSH :22</text>

  <!-- Arrow: Internet -> IGW -->
  <path d="M1140 170 L1090 225" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- VPC Outer container -->
  <rect x="40" y="190" width="1200" height="630" rx="24" fill="#eaf3de" stroke="#639922" stroke-width="2"/>
  <text x="65" y="225" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#173404">VPC — 10.0.0.0/16</text>

  <!-- Internet Gateway -->
  <g>
    <rect x="990" y="225" width="170" height="55" rx="10" fill="#e6f1fb" stroke="#378ade" stroke-width="1.5"/>
    <text x="1075" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#0c447c">Internet Gateway</text>
    <text x="1075" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#185fa5">project-igw</text>
  </g>

  <!-- Public Subnet -->
  <rect x="80" y="290" width="500" height="280" rx="16" fill="#e1f5ee" stroke="#1d9e75" stroke-width="1.5"/>
  <text x="105" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#04342c">Public subnet — 10.0.1.0/24</text>
  <text x="105" y="340" font-family="Arial, sans-serif" font-size="12" fill="#0f6e56">Route: 0.0.0.0/0 → Internet Gateway</text>

  <!-- Bastion host -->
  <g>
    <rect x="105" y="365" width="190" height="80" rx="10" fill="#ffffff" stroke="#0f6e56" stroke-width="1.5"/>
    <text x="200" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#04342c">Bastion Host</text>
    <text x="200" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0f6e56">t3.micro, public IP</text>
    <text x="200" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6e56">SG: allow SSH from my IP</text>
  </g>

  <!-- NAT Gateway -->
  <g>
    <rect x="350" y="365" width="180" height="80" rx="10" fill="#ffffff" stroke="#0f6e56" stroke-width="1.5"/>
    <text x="440" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#04342c">NAT Gateway</text>
    <text x="440" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0f6e56">project-nat</text>
    <text x="440" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6e56">Outbound only, for private subnet</text>
  </g>

  <!-- Public route table note -->
  <rect x="105" y="465" width="425" height="80" rx="10" fill="#ffffff" stroke="#1d9e75" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="488" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#04342c">public-rt</text>
  <text x="120" y="508" font-family="Arial, sans-serif" font-size="12" fill="#0f6e56">0.0.0.0/0 → igw-xxxxxxxx (Active)</text>
  <text x="120" y="528" font-family="Arial, sans-serif" font-size="12" fill="#0f6e56">10.0.0.0/16 → local (Active)</text>

  <!-- Arrows from IGW to public subnet items -->
  <path d="M990 270 L295 405" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Private Subnet -->
  <rect x="630" y="290" width="550" height="280" rx="16" fill="#faece7" stroke="#d85a30" stroke-width="1.5"/>
  <text x="655" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#4a1b0c">Private subnet — 10.0.2.0/24</text>
  <text x="655" y="340" font-family="Arial, sans-serif" font-size="12" fill="#993c1d">Route: 0.0.0.0/0 → NAT Gateway</text>

  <!-- Private EC2 -->
  <g>
    <rect x="680" y="365" width="220" height="80" rx="10" fill="#ffffff" stroke="#993c1d" stroke-width="1.5"/>
    <text x="790" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#4a1b0c">Private EC2 Instance</text>
    <text x="790" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#993c1d">Amazon Linux 2023</text>
    <text x="790" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6e56">SG: allow SSH from bastion SG only</text>
  </g>

  <!-- Private route table note -->
  <rect x="655" y="465" width="475" height="80" rx="10" fill="#ffffff" stroke="#d85a30" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="670" y="488" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#4a1b0c">private-rt</text>
  <text x="670" y="508" font-family="Arial, sans-serif" font-size="12" fill="#993c1d">0.0.0.0/0 → nat-xxxxxxxx (Active)</text>
  <text x="670" y="528" font-family="Arial, sans-serif" font-size="12" fill="#993c1d">10.0.0.0/16 → local (Active)</text>

  <!-- Arrow: Bastion -> Private EC2 -->
  <path d="M295 390 C 500 360, 600 360, 680 390" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="490" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">SSH via private IP (10.0.2.x)</text>

  <!-- Arrow: NAT -> Private EC2 (outbound internet) -->
  <path d="M530 405 L680 420" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="2 3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="80" y="600" width="1100" height="190" rx="14" fill="#ffffff" stroke="#b4b2a9" stroke-width="1"/>
  <text x="105" y="630" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Security groups</text>

  <rect x="105" y="650" width="500" height="110" rx="10" fill="#f1efe8" stroke="#888780" stroke-width="1"/>
  <text x="125" y="675" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2c2c2a">bastion-sg</text>
  <text x="125" y="698" font-family="Arial, sans-serif" font-size="13" fill="#444441">Inbound: SSH (22) from My IP /32 only</text>
  <text x="125" y="718" font-family="Arial, sans-serif" font-size="13" fill="#444441">Outbound: All traffic allowed</text>
  <text x="125" y="738" font-family="Arial, sans-serif" font-size="13" fill="#444441">Purpose: single, audited entry point to the VPC</text>

  <rect x="655" y="650" width="500" height="110" rx="10" fill="#f1efe8" stroke="#888780" stroke-width="1"/>
  <text x="675" y="675" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2c2c2a">private-ec2-sg</text>
  <text x="675" y="698" font-family="Arial, sans-serif" font-size="13" fill="#444441">Inbound: SSH (22) from bastion-sg only</text>
  <text x="675" y="718" font-family="Arial, sans-serif" font-size="13" fill="#444441">Outbound: All traffic allowed (via NAT)</text>
  <text x="675" y="738" font-family="Arial, sans-serif" font-size="13" fill="#444441">Purpose: never directly reachable from the internet</text>

</svg>
